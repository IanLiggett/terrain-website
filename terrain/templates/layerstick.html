<div id="layer-stick-{{ layer.id }}" class="bg-light border border-secondary row align-items-center mx-0 m-2">
    <h3 class="layer-stick-name col mb-0">{{ layer.name }}</h3>
    <form class="col-auto m-0 p-0 text-right" method="POST">
        <button
            type="button"
            class="toggle-layer-btn btn m-2 {% if is_active %}btn-success{% else %}btn-outline-secondary{% endif %}"
            data-layer-id="{{ layer.id }}"
            data-active="{% if is_active %}1{% else %}0{% endif %}">
            {% if is_active %}Deactivate{% else %}Activate{% endif %}
        </button>
    </form>
</div>
