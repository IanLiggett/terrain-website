{% load bootstrap4 %}
<div class="card">
    <div class="card-header d-flex row">
        <button class="col-sm-1 btn btn-outline-danger">D</button>
        <button class="btn btn-secondary flex-grow-1" type="button" data-toggle="collapse" data-target="#collapse-{{ layer.id }}">
            {{ layer.name }}
        </button>
        <button class="col-sm-2 btn btn-outline-secondary">REM</button>
    </div>
    <div id="collapse-{{ layer.id }}" class="collapse show">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {% bootstrap_form input_layer_form %}
            </form>
        </div>
    </div>
</div>
