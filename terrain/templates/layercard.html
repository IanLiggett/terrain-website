{% load bootstrap4 %}
<div id="layer-card-{{layer.id}}" class="card">
    <div class="card-header d-flex row">
        <button class="delete-layer-btn col-sm-1 btn btn-outline-danger" data-layer-id="{{ layer.id }}">D</button>
        <button class="btn btn-secondary flex-grow-1" type="button" data-toggle="collapse" data-target="#collapse-{{ layer.id }}">
            {{ layer.name }}
        </button>
        <button class="move-to-inactive-btn col-sm-2 btn btn-outline-secondary" data-layer-id="{{ layer.id }}">R</button>
    </div>
    <div id="collapse-{{ layer.id }}" class="collapse show">
        <div class="card-body">
            <!-- Grey Scale preview -->
            <canvas id="preview-{{layer.id}}" width="100" height="50"
                style="width:100%; image-rendering:optimizeSpeed; display:block; margin-bottom:8px;">
            </canvas>
            <form method="post" data-layer-id="{{layer.id}}">
                {% csrf_token %}
                <div class="form-group">
                    <label for="{{ input_layer_form.name.id_for_label }}">
                        Name:
                    </label>
                    {{ input_layer_form.name }}
                </div>
                <div class="form-group">
                    <label for="{{ input_layer_form.frequency.id_for_label }}">
                        Frequency:
                        <span class="slider-value">{{ input_layer_form.frequency.value }}</span>
                    </label>
                    {{ input_layer_form.frequency }}
                </div>
                <div class="form-group">
                    <label for="{{ input_layer_form.amplitude.id_for_label }}">
                        Amplitude:
                        <span class="slider-value">{{ input_layer_form.amplitude.value }}</span>
                    </label>
                    {{ input_layer_form.amplitude }}
                </div>
                <div class="form-group">
                    <label for="{{ input_layer_form.octaves.id_for_label }}">
                        Octaves:
                        <span class="slider-value">{{ input_layer_form.octaves.value }}</span>
                    </label>
                    {{ input_layer_form.octaves }}
                </div>
                <div class="form-group">
                    <label for="{{ input_layer_form.lacunarity.id_for_label }}">
                        Lacunarity:
                        <span class="slider-value">{{ input_layer_form.lacunarity.value }}</span>
                    </label>
                    {{ input_layer_form.lacunarity }}
                </div>
                <div class="form-group">
                    <label for="{{ input_layer_form.persistence.id_for_label }}">
                        Persistence:
                        <span class="slider-value">{{ input_layer_form.persistence.value }}</span>
                    </label>
                    {{ input_layer_form.persistence }}
                </div>
            </form>
        </div>
    </div>
</div>
